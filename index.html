<!DOCTYPE html>
<html>
<head>
  <title>Polymarket Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .market {
      background: #1e1e1e;
      padding: 12px;
      margin: 10px auto;
      width: 70%;
      border-radius: 8px;
      text-align: left;
    }

    .live {
      color: lime;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>📊 Polymarket Live Dashboard</h1>
<p class="live">● LIVE</p>

<div id="feed"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

socket.on("newMarket", (data) => {
  const div = document.createElement("div");
  div.className = "market";

  div.innerHTML = `
    🆕 <b>${data.title}</b>
  `;

  document.getElementById("feed").prepend(div);
});
</script>

</body>
</html>
