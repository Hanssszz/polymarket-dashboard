<!DOCTYPE html>
<html>
<head>
  <title>Polymarket Real New Markets</title>
  <style>
    body {
      font-family: Arial;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    .market {
      background: #1d1d1d;
      margin: 10px auto;
      padding: 12px;
      width: 75%;
      border-radius: 10px;
      text-align: left;
      border-left: 4px solid lime;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h1>📈 Real New Polymarket Markets</h1>
<p>Only showing markets created in last 10 minutes</p>

<div id="feed"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

function render(market, prepend = true) {
  const div = document.createElement("div");
  div.className = "market";

  div.innerHTML = `
    <b>${market.title}</b><br>
    <div class="meta">
      Created: ${market.createdAt}<br>
      Detected: ${market.detectedAt}
    </div>
  `;

  const feed = document.getElementById("feed");

  if (prepend) {
    feed.prepend(div);
  } else {
    feed.appendChild(div);
  }
}

socket.on("newMarket", (market) => render(market, true));
socket.on("history", (history) => history.forEach(m => render(m, false)));
</script>

</body>
</html>
