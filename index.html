<!DOCTYPE html>
<html>
<head>
  <title>Polymarket Live Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .market {
      background: #1e1e1e;
      margin: 10px auto;
      padding: 12px;
      width: 75%;
      border-radius: 10px;
      text-align: left;
      border-left: 4px solid lime;
    }

    .time {
      color: #aaa;
      font-size: 12px;
    }

    .live {
      color: lime;
      font-weight: bold;
    }

    #stats {
      margin: 10px;
      color: cyan;
    }
  </style>
</head>

<body>

<h1>📊 Polymarket Live Dashboard</h1>
<p class="live">● LIVE FEED</p>

<div id="stats"></div>
<div id="feed"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let count = 0;

// render market
function renderMarket(data, prepend = true) {
  count++;

  document.getElementById("stats").innerText =
    `Total Markets Seen: ${count}`;

  const div = document.createElement("div");
  div.className = "market";

  div.innerHTML = `
    🆕 <b>${data.title}</b><br>
    <span class="time">🕒 ${data.time}</span><br>
    <small>ID: ${data.id}</small>
  `;

  const feed = document.getElementById("feed");

  if (prepend) {
    feed.prepend(div);
  } else {
    feed.appendChild(div);
  }
}

// live updates
socket.on("newMarket", (data) => {
  renderMarket(data, true);
});

// load history on connect
socket.on("history", (history) => {
  history.forEach(m => renderMarket(m, false));
});
</script>

</body>
</html>
