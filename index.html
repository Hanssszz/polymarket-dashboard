<!DOCTYPE html>
<html>
<head>
  <title>Polymarket Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .market {
      background: #1c1c1c;
      margin: 10px auto;
      padding: 12px;
      width: 75%;
      border-radius: 10px;
      text-align: left;
      border-left: 4px solid #00ff88;
    }

    .time {
      color: #aaa;
      font-size: 12px;
    }

    #stats {
      color: cyan;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>📊 Production Polymarket Dashboard</h1>
<div id="stats">Loading...</div>
<div id="feed"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let count = 0;

function render(m) {
  count++;

  document.getElementById("stats").innerText =
    `Markets Received: ${count}`;

  const div = document.createElement("div");
  div.className = "market";

  div.innerHTML = `
    🆕 <b>${m.title}</b><br>
    <span class="time">🕒 ${m.time}</span><br>
    <small>ID: ${m.id}</small>
  `;

  document.getElementById("feed").prepend(div);
}

socket.on("newMarket", render);
socket.on("history", (data) => data.forEach(render));
</script>

</body>
</html>
